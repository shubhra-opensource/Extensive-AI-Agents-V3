<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Job Gap Coach</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
      margin: 0;
      background: #f7f7f7;
      color: #222;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 12px;
    }

    h2 {
      font-size: 16px;
      margin: 0 0 8px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      resize: vertical;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #0b57d0;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 12px;
      margin-top: 14px;
      border: 1px solid #e5e5e5;
    }

    .small {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }

    ul {
      margin: 0;
      padding-left: 18px;
    }

    li {
      margin-bottom: 6px;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.45;
      max-height: 220px;
      overflow: auto;
    }

    .pill {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      background: #eef2ff;
      color: #334;
    }

    .category-block {
      margin-bottom: 10px;
    }

    .category-title {
      font-weight: 700;
      margin-bottom: 4px;
      text-transform: capitalize;
    }
  </style>
</head>
<body>
  <h1>Job Gap Coach</h1>

  <label for="resumeText">Paste your skills</label>
  <textarea id="resumeText" placeholder="Paste your skills/resume text here..."></textarea>

  <label for="geminiApiKey">Gemini API key (optional if set via .env → env-config.js)</label>
  <input
    id="geminiApiKey"
    type="password"
    autocomplete="off"
    placeholder="Or: GEMINI_API_KEY in .env, then node scripts/write-env-config.cjs"
    style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box;"
  />

  <label style="display:flex;align-items:center;gap:8px;font-weight:500;margin-bottom:12px;cursor:pointer;">
    <input type="checkbox" id="useGemini" />
    Use Gemini for analysis (otherwise local keyword match)
  </label>

  <button id="analyzeBtn">Analyze Current Job</button>

  <div class="card">
    <div class="small">Status</div>
    <div id="status">Waiting...</div>
  </div>

  <div class="card">
    <h2>Matched skills</h2>
    <ul id="matchedSkills"></ul>
  </div>

  <div class="card">
    <h2>Missing skills</h2>
    <ul id="missingSkills"></ul>
  </div>

  <div class="card">
    <h2>Missing by category</h2>
    <div id="categoryBuckets"></div>
  </div>

  <div class="card">
    <h2>Priority learning order</h2>
    <ul id="priorityList"></ul>
  </div>

  <div class="card">
    <h2>30-day roadmap</h2>
    <ul id="roadmapList"></ul>
  </div>

  <div class="card">
    <div class="small">Extracted job page</div>
    <pre id="jobOutput">No data yet.</pre>
  </div>

  <script src="skills.js"></script>
  <script src="env-config.js"></script>
  <script src="gemini.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
